<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html forms</title>
</head>
<body>
    <form>
        <label for="Enter Name">First Name</label><br>
        <input type="text" id="Enter Name"><br><br>

        <label for="Last Name">Last Name</label><br>
        <input type="text" id="Last Name" placeholder="Enter last name"><br><br>

        <label for="Phone Number">Phone number</label><br>
        <input type="number" id="Phone" placeholder="08100000000"><br><br>

        <label for="email">Email address</label><br>
        <input type="text" id="email" placeholder="enter Email"><br><br>

        <label for="date">Date</label><br>
        <input type="date"><br><br>

        <label for="password">Password</label><br>
        <input type="password" placeholder="********" id="password"><br><br>

        <label for="image">File</label>
        <input type="file" id="image">
        
        <p>Select your gender</p>
        <input type="radio" name="gender">
        <label for="Male">Male</label>

        <input type="radio" name="gender">
        <label for="Female">Female</label>

        <input type="radio" name="gender">
        <label for="">Others</label>

        <!-- Checkbox -->

        <p>Things to buy at the store</p>
        <input type="checkbox" name="checkbox">
        <label for="Rice">Rice</label><br>

        <input type="checkbox" name="checkbox">
        <label for="Beans">Beans</label><br>

        <input type="checkbox" name="checkbox">
        <label for="Spag">Spag</label><br><br>

        <label for="">Select your State</label>
        <select>
            <option value="State">State</option>
            <option value="Adamawa">Adamawa</option>
            <option value="Akwa-ibom">Akwa-ibom</option>
            <option value="Anambra">Anambra</option>
            <option value="Bauchi">Bauchi</option>
            <option value="Bayelsa">Bayelsa</option>
        </select>
        <p>Enter comment here</p>
        <textarea name="" id=""></textarea><br><br>
        <button>Get started</button>
        
    </form>


</body>
</html>
